name: release

# Build prebuilt binaries on every version tag and attach them to the release.
# Covers macOS (arm64 + Intel) and Linux x86_64 as a static musl binary — no
# glibc dependency, so it runs on any distro (e.g. WSL2 Ubuntu 22.04, glibc 2.35;
# a glibc build on the 24.04 runner would fail there with GLIBC_2.39 not found).
# Native Windows (x86_64-pc-windows-msvc) is intentionally omitted: src/main.rs
# uses std::os::unix::fs::symlink and will not compile there yet (see issue #1).

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
                 --title "MyMem $GITHUB_REF_NAME" --generate-notes

  build:
    needs: create-release
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          asset="mymem-${GITHUB_REF_NAME}-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/mymem" "$asset"
          shasum -a 256 "$asset" > "$asset.sha256"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          asset="mymem-${GITHUB_REF_NAME}-${{ matrix.target }}"
          gh release upload "$GITHUB_REF_NAME" "$asset" "$asset.sha256" \
            --repo "$GITHUB_REPOSITORY" --clobber